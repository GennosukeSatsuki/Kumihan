<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text2Word Converter</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>

  <body>
    <aside>
      <div class="logo-section">
        <h2 style="color: var(--accent-color); font-weight: 700;">Settings</h2>
      </div>

      <div class="setting-group">
        <h2>Layout</h2>
        
        <div class="setting-item">
          <label>Text Direction <span class="sub-label">文字の方向</span></label>
          <div class="segmented-control">
            <label>
              <input type="radio" name="orientation" value="vertical" checked />
              <span>Vertical 縦書き</span>
            </label>
            <label>
              <input type="radio" name="orientation" value="horizontal" />
              <span>Horizontal 横書き</span>
            </label>
          </div>
        </div>

        <div class="setting-item">
          <div class="label-row">
            <label>Paper Size <span class="sub-label">用紙サイズ</span></label>
            <span style="color: var(--accent-color); font-weight: 600; font-size: 0.9375rem;">A4</span>
          </div>
        </div>

        <div class="setting-item">
          <label>Paper Direction <span class="sub-label">用紙の向き</span></label>
          <div class="segmented-control">
            <label>
              <input type="radio" name="paper-orientation" value="portrait" checked />
              <span>Portrait 縦</span>
            </label>
            <label>
              <input type="radio" name="paper-orientation" value="landscape" />
              <span>Landscape 横</span>
            </label>
          </div>
        </div>

        <div class="setting-item">
          <div class="label-row">
            <label>Page Numbers <span class="sub-label">ノンブル</span></label>
            <label class="switch">
              <input type="checkbox" id="nombre-toggle" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div class="setting-item" id="nombre-position-group">
          <label>Number Position <span class="sub-label">ノンブル位置</span></label>
          <div class="segmented-control">
            <label>
              <input type="radio" name="nombre-position" value="center" checked />
              <span>Center 中央</span>
            </label>
            <label>
              <input type="radio" name="nombre-position" value="left" />
              <span>Left 左下</span>
            </label>
          </div>
        </div>

        <div class="setting-item">
          <div class="label-row">
            <label>Chars per line <span class="sub-label">文字数/行</span></label>
            <input type="number" id="chars-per-line" value="40" min="1" max="100">
          </div>
        </div>

        <div class="setting-item">
          <div class="label-row">
            <label>Lines per page <span class="sub-label">行数/頁</span></label>
            <input type="number" id="lines-per-page" value="40" min="1" max="100">
          </div>
        </div>
      </div>

      <div class="setting-group" style="margin-top: auto;">
        <div id="status-text">Ready to convert</div>
      </div>
    </aside>

    <main>
      <div class="app-title">
        <i class="fa-solid fa-file-word" style="font-size: 2.5rem; color: var(--accent-color);"></i>
        <h1>Text2Word</h1>
      </div>

      <div id="drop-zone" class="drop-zone">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <p>Drag & Drop your TXT files here</p>
        <p style="font-size: 0.875rem;">or click to browse</p>
        <button class="btn-primary" id="select-btn">SELECT FILES</button>
      </div>

      <div id="file-list" class="file-list">
        <!-- Files will appear here -->
      </div>

      <div style="text-align: right;">
        <button id="convert-btn" class="btn-primary" disabled>CONVERT TO DOCX</button>
      </div>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
